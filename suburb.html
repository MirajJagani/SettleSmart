<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suburb Details</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="results-page">

  <!-- navbar（ results page） -->
  <nav class="navbar navbar-expand-lg ss-navbar sticky-top">
    <div class="container-xxl">
      <a class="navbar-brand ss-brand" href="index.html">
        <span class="ss-brand-mark">S</span>
        <span>SettleSmart</span>
      </a>
    </div>
  </nav>

  <main>

    <!-- HERO -->
    <section class="section-pad pt-4">
      <div class="container-xxl">
        <div class="results-hero">
          <div>
            <span class="ss-pill">Suburb details</span>
            <h1 id="suburbName"></h1>
            <p id="suburbDesc"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- CULTURE SECTION -->
    <section class="section-pad pt-4">
      <div class="container-xxl">
        <div class="section-header text-center mb-4">
          <span class="ss-pill ss-pill-light">Belonging signals</span>
          <h2>Cultural amenities & community</h2>
        </div>

        <div class="row g-4">

          <!-- amenities -->
          <div class="col-12 col-lg-6">
            <div class="info-card p-4">
              <h3>Nearby cultural amenities</h3>
              <div id="amenities"></div>
            </div>
          </div>

          <!-- events -->
          <div class="col-12 col-lg-6">
            <div class="info-card p-4">
              <h3>Community events</h3>
              <div id="events"></div>
            </div>
          </div>

        </div>

        <!-- photos -->
        <div class="info-card p-4 mt-4">
          <h3>Local places & community</h3>
          <div id="photos" class="d-flex gap-3 flex-wrap"></div>
        </div>

      </div>
    </section>

  </main>

  <script src="suburb.js"></script>
</body>
</html>
